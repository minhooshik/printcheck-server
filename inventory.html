<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고 관리</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0f0f13;
            color:#e8e8f0;
            font-family:'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:24px;
            padding:30px;
        }
        .title {
            font-size:22px;
            font-weight:900;
            background:linear-gradient(135deg,#00e5ff,#7c4dff);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            letter-spacing:-0.5px;
        }
        .sub {
            font-size:13px;
            color:#6b6b80;
            text-align:center;
        }
        .btn {
            padding:16px 48px;
            border-radius:16px;
            border:none;
            background:linear-gradient(135deg,#7c4dff,#00e5ff);
            color:#fff;
            font-size:17px;
            font-weight:900;
            cursor:pointer;
            letter-spacing:-0.3px;
            transition:transform 0.15s, opacity 0.15s;
            box-shadow:0 8px 24px rgba(0,229,255,0.25);
        }
        .btn:active { transform:scale(0.96); opacity:0.9; }
        .status {
            font-size:13px;
            color:#6b6b80;
            min-height:20px;
        }
        .status.error { color:#ff5252; }
    </style>
</head>
<body>
    <div class="title">📦 재고 관리</div>
    <div class="sub">버튼을 눌러 서버에 접속하세요</div>
    <button class="btn" onclick="goServer()">접속하기</button>
    <div class="status" id="status"></div>

    <script>
        async function goServer() {
            const status = document.getElementById("status");
            status.className = "status";
            status.innerText = "접속 중...";
            try {
                const res = await fetch(
                    "https://raw.githubusercontent.com/minhooshik/printcheck-server/main/server.json",
                    { cache: "no-store" }
                );
                const data = await res.json();
                if (!data.inventory_url) {
                    status.className = "status error";
                    status.innerText = "재고 서버 주소를 찾을 수 없습니다. 서버가 실행 중인지 확인하세요.";
                    return;
                }
                status.innerText = "연결 중...";
                window.location.href = data.inventory_url;
            } catch (e) {
                status.className = "status error";
                status.innerText = "접속 실패 — 인터넷 연결을 확인하세요.";
            }
        }
    </script>
</body>
</html>
